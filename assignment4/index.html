<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spökhusbyrån - Drömskräck</title>
    <script type="module" src="js/index.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="hero">
    <h1 class="logo">Spökhusbyrån AB</h1> 
    <p class="tagline">HYR ETT HEMSÖKT HUS - OM DU VÅGAR</p> 

    <form id="filter-form" class="filter-bar">
        <div class="filter-bar">
            <label for="max-price">MAX PRIS PER NATT (KR)</label>
            <input type="number" id="max-price" placeholder="T.ex. 1500"> 
        </div>

        <div class="filter-group">
            <label>LÄGSTA SKRÄCKNIVÅ: <span id="scare-label">MYSIGT</span></label>
            <input type="range" id="min-scare" min="1" max="5" value="1">
        </div>

        <div>
            <label for="ghost-type">TYP AV SPÖKE</label>
            <select id="ghost-type">
                <option value="all">Alla typer</option>
                <option value="poltergeist">Poltergeist</option>
                <option value="skuggvarelse">Skuggvarelse</option>
                <option value="vit dam">Vit dam</option>
                <option value="sjöspöke">Sjöspöke</option>
            </select>
        </div>

        <div class="filter-group checkbo-group">
            <input type="checkbox">
            <label for="wifi-checkbox">MÅSTE HA WIFI</label>
        </div>
    </form>
</header>

<main id="house-list" class="grid-container"></main>

<footer>
    <p>2026 Spökhusbyrån AB</p>
</footer>

</body>
</html>
